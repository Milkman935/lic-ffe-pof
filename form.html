<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Paddock Order Form — LIC FFE</title>

<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/form.css">
</head>
<body>

<!-- Theme toggle -->
<button class="theme-btn" onclick="togglePOFTheme()" title="Toggle light/dark mode">
  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
  </svg>
</button>

<!-- Form root — rendered by form.js -->
<div id="pof-form-root">
  <!-- Loading state -->
  <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;color:var(--text-muted)">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:.4;animation:spin 1s linear infinite">
      <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
    </svg>
    <span style="font-size:14px">Loading form…</span>
  </div>
</div>

<!-- Confirmation modal -->
<div class="modal-overlay hidden" id="pof-confirm-modal"
  onclick="if(event.target===this)this.classList.add('hidden')">
  <div class="modal-box" id="pof-confirm-body"></div>
</div>

<!-- Toast container -->
<div id="pof-toast"></div>

<style>
@keyframes spin { to { transform: rotate(360deg); } }
</style>

<!-- JSZip (xlsx = zip file manipulation) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<!-- JS — load order matters -->
<script src="js/catalog.js"></script>
<script src="js/config.js"></script>
<script src="js/storage.js"></script>
<script src="js/excel.js"></script>
<script src="js/form.js"></script>
<script>
  // Boot
  document.addEventListener('DOMContentLoaded', initForm);
</script>
</body>
</html>
